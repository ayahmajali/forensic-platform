services:
  - type: web
    name: forensic-platform
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      # Shared secret the desktop agent sends in the X-API-Key header. Without
      # this, /api/agent/upload and /api/agent/findings return 503. Generate one
      # with:  python -c "import secrets; print(secrets.token_urlsafe(32))"
      # and paste into the Render dashboard → Environment → AGENT_API_KEY.
      - key: AGENT_API_KEY
        sync: false
