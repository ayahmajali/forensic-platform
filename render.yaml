services:
  - type: web
    name: forensic-platform
    runtime: docker
    region: oregon
    plan: free
    # Build from the Dockerfile at the repo root. The context is the whole
    # repo minus entries in .dockerignore.
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # PYTHON_VERSION is no longer used (the Docker image pins python:3.11
      # internally) but leaving it here keeps the dashboard readable.
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      # Shared secret the desktop agent sends in the X-API-Key header. Without
      # this, /api/agent/upload and /api/agent/findings return 503. Generate
      # one with:
      #     python -c "import secrets; print(secrets.token_urlsafe(32))"
      # and paste into the Render dashboard → Environment → AGENT_API_KEY.
      - key: AGENT_API_KEY
        sync: false
